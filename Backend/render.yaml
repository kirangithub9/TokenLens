services:
  - type: web
    name: gemma-e4b-api
    runtime: python
    region: singapore          # closest Render region to the Ollama host (Mumbai)
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    envVars:
      # ── Required — set these in the Render dashboard (never commit values) ──
      # Supabase PostgreSQL connection string — paste from Supabase dashboard
      # Project Settings → Database → URI  (Transaction Pooler, port 6543)
      # Leave unset to fall back to local SQLite (not recommended on Render)
      - key: DATABASE_URL
        sync: false

      - key: OLLAMA_HOST
        sync: false

      - key: OLLAMA_MODEL
        sync: false

      - key: OLLAMA_API_KEY
        sync: false

      # Frontend origin(s) allowed by CORS  e.g. https://gemma-e4b.vercel.app
      - key: ALLOWED_ORIGINS
        sync: false

      # Ollama embedding model for semantic PDF search (default: nomic-embed-text)
      # Pull on your server first: ollama pull nomic-embed-text
      - key: OLLAMA_EMBED_MODEL
        value: "nomic-embed-text"

      # OpenAI — optional. Required only when GPT-4 is selected in the UI.
      - key: OPENAI_API_KEY
        sync: false

      # OpenAI model to use (default: gpt-4o-mini)
      - key: OPENAI_MODEL
        value: "gpt-4o-mini"

      # ── Optional — safe to commit defaults ───────────────────────────────
      - key: USD_TO_INR
        value: "94.9"

      - key: PYTHON_VERSION
        value: "3.12.3"

      - key: CACHE_TYPE
        value: "in_memory"
